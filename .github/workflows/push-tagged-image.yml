name: Push tagged image
defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for pushed ddev/mysql-client-build image (latest for example)'
        required: true
        default: "latest"
      debug_enabled:
        description: 'Enable debug mode'
        type: boolean
        required: false
        default: false

env:
  REGISTRY: docker.io
  DOCKER_ORG: "${{ vars.DOCKER_ORG }}"
  IMAGE: mysql-client-build
  TAG: "${{ github.event.inputs.tag }}"

permissions:
  contents: read

jobs:
  build-and-push:
    name: build ${{ matrix.arch }} mysql-client-build
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - name: Load 1password secret(s)
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: "${{ secrets.PUSH_SERVICE_ACCOUNT_TOKEN }}"
          DOCKERHUB_TOKEN: "op://push-secrets/DOCKERHUB_TOKEN/credential"

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      - name: Build and push ${{ env.DOCKER_ORG }}/${{ env.IMAGE }}:${{ env.TAG }}-${{ matrix.arch }}
        run: |
          set -eu
          cd image
          docker buildx build --push --platform "linux/${{ matrix.arch }}" -t "${DOCKER_ORG}/${IMAGE}:${TAG}-${{ matrix.arch }}" .

  create-manifest:
    name: create multi-arch manifest
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Load 1password secret(s)
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: "${{ secrets.PUSH_SERVICE_ACCOUNT_TOKEN }}"
          DOCKERHUB_TOKEN: "op://push-secrets/DOCKERHUB_TOKEN/credential"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          set -eu
          docker buildx imagetools create -t "${DOCKER_ORG}/${IMAGE}:${TAG}" "${DOCKER_ORG}/${IMAGE}:${TAG}-amd64" "${DOCKER_ORG}/${IMAGE}:${TAG}-arm64"

      - name: Clean up intermediary single-arch tags from remote registry
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username":"${{ vars.DOCKERHUB_USERNAME }}","password":"${{ env.DOCKERHUB_TOKEN }}"}' https://hub.docker.com/v2/users/login/ | jq -r .token)
          curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${DOCKER_ORG}/${IMAGE}/tags/${TAG}-amd64/" >/dev/null || true
          curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${DOCKER_ORG}/${IMAGE}/tags/${TAG}-arm64/" >/dev/null || true
